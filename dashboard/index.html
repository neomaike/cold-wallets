<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f512;</text></svg>">
<title>Cold Wallets</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e14;--bg2:#0d1117;--card:#151b23;--card2:#1a2130;--card3:#1e2738;
  --border:#252d38;--border2:#2d3748;
  --text:#e2e8f0;--text2:#8892a4;--text3:#5a6578;
  --accent:#60a5fa;--accent2:#3b82f6;
  --green:#34d399;--green2:#10b981;
  --red:#f87171;--red2:#ef4444;
  --yellow:#fbbf24;--orange:#f59e0b;
  --purple:#a78bfa;
  --radius:12px;--radius-sm:8px;
  --sidebar-w:480px;
  --hdr-h:56px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;line-height:1.5;display:flex;flex-direction:column}
@media(max-width:900px){:root{--sidebar-w:100vw}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* HEADER */
.hdr{height:var(--hdr-h);min-height:var(--hdr-h);background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff}
.hdr h1{font-size:15px;font-weight:700}
.hdr h1 b{background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-right{display:flex;align-items:center;gap:8px}
.pills{display:flex;gap:5px}
.pill{font-size:8px;padding:2px 8px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.pill.g{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.pill.r{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.pill.y{background:rgba(251,191,36,.08);color:var(--yellow);border:1px solid rgba(251,191,36,.2)}

/* MAIN GRID — fills remaining height */
.main{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:12px;padding:12px 16px;overflow:hidden;min-height:0}
@media(max-width:1100px){.main{grid-template-columns:1fr 1fr;grid-template-rows:auto}}
@media(max-width:700px){.main{grid-template-columns:1fr;overflow-y:auto}}

/* CARD */
.cd{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.cd-h{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cd-h h2{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.cd-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;margin-right:8px;flex-shrink:0}
.cd-h-left{display:flex;align-items:center}
.cd-b{padding:12px 14px;flex:1;overflow-y:auto;min-height:0}

/* STATUS ROWS */
.rw{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(37,45,56,.4);font-size:12px}
.rw:last-child{border:none}
.rw .l{color:var(--text2);font-weight:500;white-space:nowrap;margin-right:8px}.rw .r{font-weight:500;text-align:right;word-break:break-all;min-width:0}
.d{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.d.g{background:var(--green);box-shadow:0 0 5px rgba(52,211,153,.4)}.d.r{background:var(--red);box-shadow:0 0 5px rgba(248,113,113,.3)}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.st{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:8px 4px;text-align:center}
.st .n{font-size:18px;font-weight:800;color:var(--text)}
.st .t{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-top:1px;font-weight:600}

/* FORMS */
input,select{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:12px;width:100%;outline:none;transition:border-color .2s;font-family:inherit}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
label{font-size:9px;color:var(--text3);margin-bottom:3px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.fld{margin-bottom:8px}

/* BUTTONS */
.bt{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 13px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.bt:disabled{opacity:.3;cursor:not-allowed}
.bt:active:not(:disabled){transform:scale(.97)}
.bt-p{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff}.bt-p:hover:not(:disabled){box-shadow:0 3px 12px rgba(59,130,246,.3)}
.bt-g{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff}.bt-g:hover:not(:disabled){box-shadow:0 3px 12px rgba(16,185,129,.3)}
.bt-d{background:linear-gradient(135deg,var(--red2),var(--red));color:#fff}.bt-d:hover:not(:disabled){box-shadow:0 3px 12px rgba(239,68,68,.25)}
.bt-o{background:var(--card2);border:1px solid var(--border);color:var(--text2)}.bt-o:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.bt-full{width:100%}
.bt-xs{padding:3px 8px;font-size:9px;font-weight:600}
.brow{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* MESSAGES */
.ms{padding:7px 10px;border-radius:6px;font-size:11px;margin-top:8px;line-height:1.5}
.ms.ok{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.18);color:var(--green)}
.ms.er{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);color:var(--red)}
.ms.in{background:rgba(96,165,250,.05);border:1px solid rgba(96,165,250,.12);color:var(--accent)}
.ms.wn{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.12);color:var(--yellow)}

/* MISC */
.mo{font-family:'SF Mono',Consolas,monospace;font-size:10px;word-break:break-all}
.tabs{display:flex;background:var(--card2);border-radius:6px;padding:2px;border:1px solid var(--border);margin-bottom:8px}
.tab{flex:1;padding:4px;text-align:center;font-size:10px;font-weight:600;cursor:pointer;border-radius:4px;transition:all .15s;color:var(--text3)}
.tab.on{background:var(--card);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.2)}
.al{max-height:120px;overflow-y:auto}
.ai{padding:4px 0;border-bottom:1px solid rgba(37,45,56,.3);font-size:10px;display:flex;justify-content:space-between;align-items:center}
.ai:last-child{border:none}
.at{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;text-transform:uppercase}
.at.btc{background:rgba(247,147,26,.1);color:#f59e0b}.at.eth{background:rgba(98,126,234,.1);color:#818cf8}
.sp{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.hide{display:none!important}

/* SIDEBAR OVERLAY */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:55;opacity:0;pointer-events:none;transition:opacity .3s}
.sb-overlay.open{opacity:1;pointer-events:auto}
.sb{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:60;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.4)}
.sb.open{transform:translateX(0)}
.sb-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-head h3{font-size:14px;font-weight:700}
.sb-close{width:28px;height:28px;border-radius:6px;border:none;background:var(--card2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sb-close:hover{background:var(--red);color:#fff}
.sb-body{flex:1;overflow-y:auto;padding:14px 18px}
.sb-foot{padding:10px 18px;border-top:1px solid var(--border);flex-shrink:0}

/* WALLET TABS */
.wc-tabs{display:flex;margin-bottom:12px;background:var(--card2);border-radius:6px;padding:3px;border:1px solid var(--border)}
.wc-tab{flex:1;padding:7px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;border-radius:4px;transition:all .2s;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.wc-tab.on{color:#fff}
.wc-tab.eth.on{background:linear-gradient(135deg,#627eea,#8b5cf6)}
.wc-tab.btc.on{background:linear-gradient(135deg,#f7931a,#f59e0b)}
.wc-panel{display:none}.wc-panel.on{display:block}
.wc{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.wc:last-child{margin-bottom:0}
.wc-top{margin-bottom:8px}
.wc-num{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;border-radius:20px}
.wc-num.eth{background:rgba(98,126,234,.12);color:#818cf8}
.wc-num.btc{background:rgba(247,147,26,.12);color:#f59e0b}
.wc-row{margin-bottom:6px}.wc-row:last-child{margin-bottom:0}
.wc-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px}
.wc-val{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:6px 8px}
.wc-val span{flex:1;font-family:'SF Mono',Consolas,monospace;font-size:10px;word-break:break-all}
.wc-val input{flex:1;background:none;border:none;font-family:'SF Mono',Consolas,monospace;font-size:10px;color:var(--text);padding:0;outline:none;width:0;min-width:0}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo">CW</div>
    <h1>Cold <b>Wallets</b></h1>
  </div>
  <div class="hdr-right">
    <div class="pills" id="pills"></div>
    <button class="bt bt-p hide" id="sb-toggle" onclick="toggleSidebar()" style="padding:5px 12px;font-size:11px">My Wallets</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sb-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>
<div class="sb" id="sidebar">
  <div class="sb-head">
    <h3 id="sb-title">Generated Wallets</h3>
    <button class="sb-close" onclick="toggleSidebar()">&times;</button>
  </div>
  <div class="sb-body" id="sb-body"></div>
  <div class="sb-foot">
    <div class="ms wn" style="margin:0;font-size:10px" id="sb-file"></div>
  </div>
</div>

<div class="main">

  <!-- STATUS + TOR -->
  <div class="cd">
    <div class="cd-h">
      <div class="cd-h-left"><div class="cd-icon" style="background:rgba(96,165,250,.12);color:var(--accent)">S</div><h2>System Status</h2></div>
      <button class="bt bt-o bt-xs" onclick="autoRefresh()">Refresh</button>
    </div>
    <div class="cd-b" id="st-body"><div style="text-align:center;padding:12px"><span class="sp"></span></div></div>
    <div id="tor-ctl" class="hide" style="padding:0 14px 10px">
      <div class="brow" style="margin:0"><button class="bt bt-g bt-xs" onclick="torAct('start',this)">Start Tor</button><button class="bt bt-o bt-xs" onclick="torAct('stop',this)">Stop</button><button class="bt bt-o bt-xs" onclick="torAct('download',this)">Download</button></div>
      <div id="tor-msg"></div>
    </div>
  </div>

  <!-- GENERATE -->
  <div class="cd">
    <div class="cd-h">
      <div class="cd-h-left"><div class="cd-icon" style="background:rgba(167,139,250,.12);color:var(--purple)">G</div><h2>Generate Wallets</h2></div>
    </div>
    <div class="cd-b">
      <div class="fld">
        <label>Count per crypto</label>
        <select id="gen-n"><option>3</option><option>5</option><option>10</option></select>
      </div>
      <button class="bt bt-p bt-full" onclick="genWal(this)">Generate Cold Wallets</button>
      <button class="bt bt-o bt-full hide" id="open-wallets" onclick="toggleSidebar()" style="margin-top:6px">View Generated Wallets</button>
      <div id="gen-r"></div>
    </div>
  </div>

  <!-- DISPOSABLE -->
  <div class="cd">
    <div class="cd-h">
      <div class="cd-h-left"><div class="cd-icon" style="background:rgba(52,211,153,.12);color:var(--green)">D</div><h2>Disposable Pool</h2></div>
    </div>
    <div class="cd-b">
      <div class="sg">
        <div class="st"><div class="n" id="du">0</div><div class="t">Unused</div></div>
        <div class="st"><div class="n" id="da">0</div><div class="t">Active</div></div>
        <div class="st"><div class="n" id="df">0</div><div class="t">Funded</div></div>
        <div class="st"><div class="n" id="dp">0</div><div class="t">Spent</div></div>
      </div>
      <div class="brow"><button class="bt bt-o bt-xs" onclick="genDisp('btc',10,this)">+10 BTC</button><button class="bt bt-o bt-xs" onclick="genDisp('eth',10,this)">+10 ETH</button><button class="bt bt-o bt-xs" onclick="genDisp('both',10,this)">+10 Both</button></div>
      <div style="margin-top:8px">
        <div class="tabs"><div class="tab on" onclick="dispList('active',this)">Active</div><div class="tab" onclick="dispList('funded',this)">Funded</div><div class="tab" onclick="dispList('unused',this)">Unused</div></div>
        <div class="al" id="dl"><div style="padding:6px;color:var(--text3);font-size:10px">Click +10 above to generate a pool</div></div>
      </div>
      <div class="brow"><button class="bt bt-o bt-xs" onclick="dispGet('btc',this)">Get BTC</button><button class="bt bt-o bt-xs" onclick="dispGet('eth',this)">Get ETH</button></div>
      <div id="dr"></div>
    </div>
  </div>

  <!-- SEND BTC -->
  <div class="cd">
    <div class="cd-h">
      <div class="cd-h-left"><div class="cd-icon" style="background:rgba(247,147,26,.12);color:#f59e0b">B</div><h2>Send Bitcoin</h2></div>
    </div>
    <div class="cd-b">
      <div class="fld"><label>Private Key (WIF)</label><input type="password" id="bw" placeholder="5J... or K... or L..."></div>
      <button class="bt bt-o bt-full" onclick="prepBtc(this)">Check Balance</button>
      <div id="bi" class="hide" style="margin-top:10px">
        <div id="bb"></div>
        <div class="fld" style="margin-top:8px"><label>Destination</label><input id="bd" placeholder="bc1q... or 3... or 1..."></div>
        <div class="fld"><label>Fee (sat/vB)</label><input type="number" id="bf" value="10"></div>
        <button class="bt bt-d bt-full" onclick="sendBtc(this)">Sign &amp; Broadcast</button>
      </div>
      <div id="br"></div>
    </div>
  </div>

  <!-- SEND ETH -->
  <div class="cd">
    <div class="cd-h">
      <div class="cd-h-left"><div class="cd-icon" style="background:rgba(98,126,234,.12);color:#818cf8">E</div><h2>Send Ethereum</h2></div>
    </div>
    <div class="cd-b">
      <div class="fld"><label>Private Key (hex)</label><input type="password" id="ep" placeholder="0x..."></div>
      <button class="bt bt-o bt-full" onclick="prepEth(this)">Check Balance</button>
      <div id="ei" class="hide" style="margin-top:10px">
        <div id="eb"></div>
        <div class="fld" style="margin-top:8px"><label>Destination</label><input id="ed" placeholder="0x..."></div>
        <button class="bt bt-d bt-full" onclick="sendEth(this)">Sign &amp; Broadcast (EIP-1559)</button>
      </div>
      <div id="er"></div>
    </div>
  </div>

  <!-- RPC -->
  <div class="cd">
    <div class="cd-h">
      <div class="cd-h-left"><div class="cd-icon" style="background:rgba(251,191,36,.12);color:var(--yellow)">R</div><h2>RPC Status</h2></div>
    </div>
    <div class="cd-b" id="rpc"><div style="color:var(--text3);font-size:11px">Loading...</div></div>
    <div id="rpc-ctl" class="hide" style="padding:0 14px 10px">
      <div class="brow" style="margin:0"><button class="bt bt-g bt-xs" onclick="rpcAct('start',this)">Start RPC</button><button class="bt bt-o bt-xs" onclick="rpcAct('stop',this)">Stop</button></div>
      <div id="rpc-msg"></div>
    </div>
  </div>

</div>

<script>
(function(){
"use strict";

function callApi(ep,d){d=d||{};var c=new AbortController();var t=setTimeout(function(){c.abort();},30000);return fetch('/api/'+ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d),signal:c.signal}).then(function(r){return r.json();}).finally(function(){clearTimeout(t);});}
function el(id){return document.getElementById(id);}
function setMsg(id,t,c){c=c||'in';el(id).innerHTML='<div class="ms '+c+'">'+t+'</div>';}
function ld(b){b.disabled=true;b._t=b.innerHTML;b.innerHTML='<span class="sp"></span>';}
function dn(b){b.disabled=false;b.innerHTML=b._t;}
function dot(ok){return ok?'<span class="d g"></span>':'<span class="d r"></span>';}
function cpk(txt,b){navigator.clipboard.writeText(txt).then(function(){var o=b.textContent;b.textContent='OK';b.style.color='var(--green)';setTimeout(function(){b.textContent=o;b.style.color='';},1000);});}
window.cpk=cpk;
function toggleKey(id){var i=document.getElementById(id);i.type=i.type==='password'?'text':'password';var btn=i.parentElement.querySelector('.tk');if(btn)btn.textContent=i.type==='password'?'Show':'Hide';}
window.toggleKey=toggleKey;

var _sbOpen=false;
function toggleSidebar(){_sbOpen=!_sbOpen;el('sidebar').classList.toggle('open',_sbOpen);el('sb-overlay').classList.toggle('open',_sbOpen);}
window.toggleSidebar=toggleSidebar;

async function loadSt(){
  try{
    var s=await callApi('status');
    var torC=s.tor&&s.tor.connected;
    var depOk=s.deps&&Object.values(s.deps).every(function(v){return v;});
    el('pills').innerHTML=(torC?'<span class="pill g">Tor</span>':'<span class="pill r">Tor</span>')+(s.admin?'<span class="pill g">Admin</span>':'<span class="pill y">No Admin</span>')+(depOk?'<span class="pill g">Deps</span>':'<span class="pill r">Deps</span>');
    var h='';
    h+='<div class="rw"><span class="l">Tor</span><span class="r">'+dot(torC)+(torC?'Port '+s.tor.port+' <span class="mo">'+s.tor.ip+'</span>':'Off')+'</span></div>';
    h+='<div class="rw"><span class="l">Network</span><span class="r">'+dot(s.online)+(s.online?'Online':'Offline')+'</span></div>';
    h+='<div class="rw"><span class="l">Admin</span><span class="r">'+dot(s.admin)+(s.admin?'Yes':'No')+'</span></div>';
    h+='<div class="rw"><span class="l">Docker</span><span class="r">'+dot(s.docker)+(s.docker?'Yes':'No')+'</span></div>';
    h+='<div class="rw"><span class="l">Python</span><span class="r">'+s.python+'</span></div>';
    if(s.deps){var dl=Object.entries(s.deps).map(function(e){return dot(e[1])+e[0];}).join(' ');h+='<div class="rw"><span class="l">Deps</span><span class="r" style="font-size:11px">'+dl+'</span></div>';}
    el('st-body').innerHTML=h;
    el('tor-ctl').classList.toggle('hide',torC===true);
    if(s.disposable){el('du').textContent=s.disposable.unused;el('da').textContent=s.disposable.active;el('df').textContent=s.disposable.funded;el('dp').textContent=s.disposable.spent;}
    var rpcOk=s.rpc&&s.rpc.responding;
    if(rpcOk){el('rpc').innerHTML='<div class="rw"><span class="l">Port 8545</span><span class="r">'+dot(1)+'Block #'+(s.rpc.block?s.rpc.block.toLocaleString():'?')+'</span></div>';}
    else{el('rpc').innerHTML='<div class="rw"><span class="l">Port 8545</span><span class="r">'+dot(0)+'Not responding</span></div>';}
    el('rpc-ctl').classList.toggle('hide',rpcOk===true);
  }catch(e){el('st-body').innerHTML='<div class="ms er">'+e.message+'</div>';}
}

async function torAct(a,b){ld(b);try{var r=await callApi('tor/'+a);setMsg('tor-msg',r.msg,r.ok?'ok':'er');setTimeout(autoRefresh,1000);setTimeout(autoRefresh,3000);}catch(e){setMsg('tor-msg',e.message,'er');}finally{dn(b);}}
async function rpcAct(a,b){ld(b);try{var r=await callApi('rpc/'+a);setMsg('rpc-msg',r.msg,r.ok?'ok':'er');setTimeout(autoRefresh,1000);setTimeout(autoRefresh,3000);}catch(e){setMsg('rpc-msg',e.message,'er');}finally{dn(b);}}

function wcHtml(type,idx,addr,key,klbl){
  var id='k'+Math.random().toString(36).slice(2,8);
  return '<div class="wc"><div class="wc-top"><span class="wc-num '+type+'">'+type.toUpperCase()+' #'+idx+'</span></div>'
    +'<div class="wc-row"><div class="wc-label">Address</div><div class="wc-val"><span>'+addr+'</span><button class="bt bt-o bt-xs" onclick="cpk(\''+addr+'\',this)">Copy</button></div></div>'
    +'<div class="wc-row"><div class="wc-label">'+klbl+'</div><div class="wc-val"><input type="password" id="'+id+'" value="'+key+'" readonly>'
    +'<button class="bt bt-o bt-xs tk" onclick="toggleKey(\''+id+'\')">Show</button><button class="bt bt-o bt-xs" onclick="cpk(\''+key+'\',this)">Copy</button></div></div></div>';
}

async function genWal(b){
  ld(b);try{
    var r=await callApi('generate-wallets',{count:parseInt(el('gen-n').value)});
    if(r.error){setMsg('gen-r',r.error,'er');return;}
    var ethH='';var btcH='';
    r.ethereum.forEach(function(w){ethH+=wcHtml('eth',w.index,w.address,w.private_key,'Private Key (hex)');});
    r.bitcoin.forEach(function(w){btcH+=wcHtml('btc',w.index,w.address,w.wif,'WIF (Private Key)');});
    el('sb-body').innerHTML='<div class="wc-tabs"><div class="wc-tab eth on" onclick="switchWTab(\'eth\',this)">ETH ('+r.ethereum.length+')</div><div class="wc-tab btc" onclick="switchWTab(\'btc\',this)">BTC ('+r.bitcoin.length+')</div></div><div class="wc-panel on" id="wp-eth">'+ethH+'</div><div class="wc-panel" id="wp-btc">'+btcH+'</div>';
    el('sb-file').innerHTML='Saved: <span class="mo">'+r.file+'</span><br>Write down keys, then delete file.';
    el('sb-title').textContent=r.ethereum.length+' ETH + '+r.bitcoin.length+' BTC';
    el('sb-toggle').classList.remove('hide');el('open-wallets').classList.remove('hide');
    if(!_sbOpen)toggleSidebar();
    setMsg('gen-r','Wallets generated!','ok');
  }catch(e){setMsg('gen-r',e.message,'er');}finally{dn(b);}
}
function switchWTab(type,tabEl){document.querySelectorAll('.wc-tab').forEach(function(t){t.classList.remove('on');});tabEl.classList.add('on');document.querySelectorAll('.wc-panel').forEach(function(p){p.classList.remove('on');});el('wp-'+type).classList.add('on');}
window.switchWTab=switchWTab;

async function genDisp(c,n,b){ld(b);try{var r=await callApi('generate-disposable',{crypto:c,count:n});if(r.error){setMsg('dr',r.error,'er');return;}setMsg('dr','+'+(r.btc||0)+' BTC +'+(r.eth||0)+' ETH','ok');loadSt();}catch(e){setMsg('dr',e.message,'er');}finally{dn(b);}}
async function dispList(s,tabEl){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});tabEl.classList.add('on');try{var r=await callApi('disposable/list',{state:s});var items=r[s]||[];el('dl').innerHTML=items.length?items.map(function(a){return '<div class="ai"><span class="mo">'+a.address+'</span><span class="at '+(a.crypto||'')+'">'+a.crypto+'</span></div>';}).join(''):'<div style="padding:6px;color:var(--text3);font-size:10px">Empty</div>';}catch(e){el('dl').innerHTML='<div class="ms er">'+e.message+'</div>';}}
async function dispGet(c,b){ld(b);try{var r=await callApi('disposable/get-address',{crypto:c});if(r.error){setMsg('dr',r.error,'er');return;}setMsg('dr',r.crypto.toUpperCase()+': <span class="mo">'+r.address+'</span>','ok');loadSt();}catch(e){setMsg('dr',e.message,'er');}finally{dn(b);}}

async function prepBtc(b){ld(b);try{var r=await callApi('prepare-btc',{wif:el('bw').value});if(r.error){var em=r.error;if(r.tested&&r.tested.length)em+='<br><span style="font-size:10px;color:var(--text3)">'+r.tested.map(function(a){return '<span class="mo">'+a+'</span>';}).join('<br>')+'</span>';setMsg('br',em,'er');el('bi').classList.add('hide');return;}
  var fee=(r.fees&&r.fees.halfHourFee)?r.fees.halfHourFee:10;
  el('bb').innerHTML='<div class="rw"><span class="l">Addr</span><span class="r mo">'+r.address+'</span></div><div class="rw"><span class="l">Balance</span><span class="r">'+(r.balance_sats/1e8).toFixed(8)+' BTC</span></div><div class="rw"><span class="l">UTXOs</span><span class="r">'+r.utxos+'</span></div>';
  el('bf').value=fee;el('bi').classList.remove('hide');el('br').innerHTML='';
}catch(e){setMsg('br',e.message,'er');}finally{dn(b);}}

async function sendBtc(b){if(!confirm('Sign and broadcast BTC? IRREVERSIBLE.'))return;ld(b);try{var r=await callApi('send-btc',{wif:el('bw').value,destination:el('bd').value,fee_rate:parseInt(el('bf').value)});el('bw').value='';if(r.error&&!r.success){setMsg('br',r.error,'er');return;}if(r.success)setMsg('br','Sent '+r.amount_btc+' BTC<br><span class="mo">'+r.txid+'</span>','ok');else setMsg('br','Broadcast failed. Saved: <span class="mo">'+r.file+'</span>','wn');el('bi').classList.add('hide');}catch(e){setMsg('br',e.message,'er');}finally{dn(b);}}

async function prepEth(b){ld(b);try{var r=await callApi('prepare-eth',{private_key:el('ep').value});if(r.error){setMsg('er',r.error,'er');el('ei').classList.add('hide');return;}
  var fl='';if(r.fees){fl=r.fees.legacy?'<div class="rw"><span class="l">Gas</span><span class="r">'+r.fees.maxFee_gwei+' Gwei</span></div>':'<div class="rw"><span class="l">Max Fee</span><span class="r">'+r.fees.maxFee_gwei+' Gwei</span></div>';}
  el('eb').innerHTML='<div class="rw"><span class="l">Addr</span><span class="r mo">'+r.address+'</span></div><div class="rw"><span class="l">Balance</span><span class="r">'+parseFloat(r.balance_eth).toFixed(6)+' ETH</span></div>'+fl;
  el('ei').classList.remove('hide');el('er').innerHTML='';
}catch(e){setMsg('er',e.message,'er');}finally{dn(b);}}

async function sendEth(b){if(!confirm('Sign and broadcast ETH? IRREVERSIBLE.'))return;ld(b);try{var r=await callApi('send-eth',{private_key:el('ep').value,destination:el('ed').value});el('ep').value='';if(r.error&&!r.success){setMsg('er',r.error,'er');return;}if(r.success)setMsg('er','Sent '+r.amount_eth+' ETH<br><span class="mo">'+r.txid+'</span>','ok');else setMsg('er','Broadcast failed. Saved: <span class="mo">'+r.file+'</span>','wn');el('ei').classList.add('hide');}catch(e){setMsg('er',e.message,'er');}finally{dn(b);}}

window.loadSt=loadSt;window.torAct=torAct;window.rpcAct=rpcAct;window.genWal=genWal;
window.genDisp=genDisp;window.dispList=dispList;window.dispGet=dispGet;
window.prepBtc=prepBtc;window.sendBtc=sendBtc;window.prepEth=prepEth;window.sendEth=sendEth;

var _busy=false;
async function autoRefresh(){if(_busy)return;_busy=true;try{await loadSt();}finally{_busy=false;}}
window.autoRefresh=autoRefresh;
autoRefresh();dispList('active',document.querySelector('.tab.on'));
setTimeout(autoRefresh,3000);setTimeout(autoRefresh,8000);setInterval(autoRefresh,20000);
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&_sbOpen)toggleSidebar();});
})();
</script>
</body>
</html>

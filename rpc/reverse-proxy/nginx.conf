# Nginx Reverse Proxy for Helios RPC
# Features: mTLS authentication, rate limiting, logging

# Worker configuration
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ==========================================================================
    # LOGGING
    # ==========================================================================

    # Custom log format with timing and client info
    log_format rpc_log '$remote_addr - $ssl_client_s_dn - [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log rpc_log;

    # ==========================================================================
    # RATE LIMITING
    # ==========================================================================

    # Rate limit zone: 10 requests/second per IP
    # $binary_remote_addr is more memory efficient than $remote_addr
    limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=10r/s;

    # Return 429 when rate limit exceeded
    limit_req_status 429;

    # ==========================================================================
    # UPSTREAM (Helios RPC)
    # ==========================================================================

    upstream helios {
        # Helios on localhost
        # Use host.docker.internal when running in Docker
        server host.docker.internal:8545;

        # Connection settings
        keepalive 32;
    }

    # ==========================================================================
    # HTTPS SERVER WITH mTLS
    # ==========================================================================

    server {
        listen 8443 ssl;
        server_name localhost;

        # ----------------------------------------------------------------------
        # SSL/TLS Configuration
        # ----------------------------------------------------------------------

        # Server certificate and key
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # CA certificate for verifying client certs
        ssl_client_certificate /etc/nginx/certs/ca.crt;

        # Require client certificate (mTLS)
        ssl_verify_client on;
        ssl_verify_depth 2;

        # Modern TLS configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # SSL session settings
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # ----------------------------------------------------------------------
        # Request Limits
        # ----------------------------------------------------------------------

        # Maximum request body size (JSON-RPC should be small)
        client_max_body_size 1m;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # ----------------------------------------------------------------------
        # RPC Endpoint
        # ----------------------------------------------------------------------

        location / {
            # Apply rate limiting
            # burst=20: allow 20 extra requests in queue
            # nodelay: don't delay requests, just count them
            limit_req zone=rpc_limit burst=20 nodelay;

            # Only allow POST (JSON-RPC uses POST)
            if ($request_method !~ ^(POST|OPTIONS)$) {
                return 405;
            }

            # CORS headers - restrict to known wallet extensions
            # WARNING: Do NOT use '*' - allows any website to query your RPC
            set $cors_origin '';
            if ($http_origin ~* "^chrome-extension://") {
                set $cors_origin $http_origin;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Proxy to Helios
            proxy_pass http://helios;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Content-Type "application/json";

            # Security headers
            proxy_hide_header X-Powered-By;
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
        }

        # Health check endpoint (no auth required)
        location /health {
            # No rate limit for health checks
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }

    # ==========================================================================
    # HTTP SERVER (Redirect to HTTPS) - Optional
    # ==========================================================================

    # Uncomment to redirect HTTP to HTTPS
    # server {
    #     listen 8080;
    #     server_name localhost;
    #     return 301 https://$host:8443$request_uri;
    # }

    # ==========================================================================
    # PLAIN HTTP SERVER (No mTLS) - Development Only
    # ==========================================================================

    # Uncomment for development/testing without certificates
    # WARNING: No authentication - only use on localhost
    #
    # server {
    #     listen 8080;
    #     server_name localhost;
    #
    #     location / {
    #         limit_req zone=rpc_limit burst=20 nodelay;
    #         proxy_pass http://helios;
    #         proxy_http_version 1.1;
    #         proxy_set_header Connection "";
    #     }
    # }
}

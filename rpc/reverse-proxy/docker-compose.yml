# Nginx Reverse Proxy with mTLS for Helios RPC

version: "3.8"

services:
  nginx:
    container_name: rpc-proxy
    image: nginx:stable-alpine
    restart: unless-stopped

    # Mount configuration and certificates
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs:/var/log/nginx

    # SECURITY: Bind to localhost only
    ports:
      - "127.0.0.1:8443:8443"

    # Connect to host to reach Helios
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Security options
    security_opt:
      - no-new-privileges:true

    # Read-only filesystem
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache/nginx

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-sf", "--cacert", "/etc/nginx/certs/ca.crt", "https://127.0.0.1:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

    # Depends on Helios being available
    # Note: This doesn't actually depend on Helios container if running separately
    # depends_on:
    #   - helios

# =============================================================================
# USAGE
# =============================================================================
#
# 1. Generate certificates first:
#    ..\..\scripts\generate-certs.ps1
#
# 2. Start proxy:
#    docker compose up -d
#
# 3. Test with mTLS:
#    curl --cacert certs/ca.crt --cert certs/client.crt --key certs/client.key \
#         https://127.0.0.1:8443 -X POST -H "Content-Type: application/json" \
#         -d '{"jsonrpc":"2.0","method":"eth_blockNumber","id":1}'
#
# 4. Check logs:
#    docker logs rpc-proxy
#    cat logs/access.log

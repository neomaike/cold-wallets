# Arbitrum One L2 Node - Docker Compose
# Runs Nitro full node

version: "3.8"

services:
  # ==========================================================================
  # ARBITRUM NITRO - Full Node
  # ==========================================================================
  nitro:
    container_name: arbitrum-nitro
    # Pin version. Check: https://github.com/OffchainLabs/nitro/releases
    image: offchainlabs/nitro-node:v3.9.5-66e42c4
    restart: unless-stopped

    volumes:
      - ./data:/home/user/.arbitrum

    # SECURITY: Bind to localhost only
    ports:
      - "127.0.0.1:8547:8547"   # HTTP RPC
      - "127.0.0.1:8548:8548"   # WebSocket

    command:
      # L1 Connection - CHANGE THIS to your L1 RPC
      - --parent-chain.connection.url=http://host.docker.internal:8545
      # Alternative:
      # - --parent-chain.connection.url=https://eth-mainnet.g.alchemy.com/v2/YOUR_KEY

      # Chain configuration
      - --chain.id=42161
      - --chain.name=arb1

      # HTTP RPC
      - --http.addr=0.0.0.0
      - --http.port=8547
      - --http.api=net,web3,eth,debug
      - --http.corsdomain=chrome-extension://*
      - --http.vhosts=localhost

      # WebSocket
      - --ws.addr=0.0.0.0
      - --ws.port=8548
      - --ws.api=net,web3,eth,debug
      - --ws.origins=chrome-extension://*

      # Execution settings
      - --execution.forwarding-target=null
      - --execution.caching.archive=false

      # Node settings
      - --node.feed.input.url=wss://arb1.arbitrum.io/feed
      - --node.data-availability.enable=false

      # Performance
      - --init.prune=full

    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Arbitrum needs significant resources
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 8G

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8547", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s  # Arbitrum takes longer to start

networks:
  default:
    driver: bridge

# =============================================================================
# NOTES
# =============================================================================
#
# Disk Requirements:
# - Full node: 500 GB - 1 TB
# - Archive node: 2+ TB
#
# Snapshot Download (Recommended):
# Syncing from genesis takes weeks. Download a snapshot instead:
#   curl -L https://snapshot.arbitrum.io/mainnet/nitro.tar -o nitro.tar
#   tar -xvf nitro.tar -C ./data/
#
# Memory:
# Arbitrum Nitro is memory-intensive. 16 GB RAM recommended.
#
# L1 RPC:
# Edit --parent-chain.connection.url to your L1 source.
# If using Helios: http://host.docker.internal:8545
#
# Feed URL:
# The feed provides real-time transaction data from the sequencer.
# This is the official Arbitrum feed. If self-hosting a sequencer,
# you can change this.
